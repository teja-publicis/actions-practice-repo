name: multi-job workflow

on: 
  workflow_dispatch:     
jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: building
        run: |
          echo Image Built
          echo Hello ${{vars.MY_NAME}}
          echo Docker Password is ${{secrets.DOCKERHUB_PASSWORD}}
        
  Test:
    needs: Build
    runs-on: ubuntu-24.04
    steps:
      - name: testing
        run: |
          echo tested the application
        
  Deploy:
    needs: Test
    runs-on: ubuntu-slim
    steps:
      - name: Deploying
        run: echo deployed
